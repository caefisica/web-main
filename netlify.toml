[build]
  publish = "public"
  functions = "functions"
  command = "git config core.quotepath false && pnpm install && pnpm run build"

[build.environment]
  HUGO_VERSION = "0.157.0"
  NODE_VERSION = "22"
  PNPM_VERSION = "10"

[context.deploy-preview]
  command = "git config core.quotepath false && pnpm install && pnpm run build -- -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "git config core.quotepath false && pnpm install && pnpm run build -- -b $DEPLOY_PRIME_URL"

[context.next]
  command = "git config core.quotepath false && pnpm install && pnpm run build"

[context.next.environment]
  HUGO_ENV = "next"

[functions]
  directory = "functions"
  node_bundler = "esbuild"

[dev]
  framework = "#custom"
  command = "pnpm run hugo:start"
  targetPort = 1313
  port = 8888
  publish = "public"
  autoLaunch = false

[[redirects]]
  from = "https://caefis.netlify.app/*"
  to = "https://caefisica.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/bee.js"
  to = "https://cdn.splitbee.io/sb.js"
  status = 200

[[redirects]]
  from = "/_hive/*"
  to = "https://hive.splitbee.io/:splat"
  status = 200

[[plugins]]
package = "@algolia/netlify-plugin-crawler"

  [plugins.inputs]
  branches = ['master']
  disabled = false
  customDomain = "caefisica.com"
  renderJavaScript = true

[[plugins]]
  package = "netlify-plugin-cloudinary"

  [plugins.inputs]
  cloudName = "dubu"
  loadingStrategy = "lazy"

