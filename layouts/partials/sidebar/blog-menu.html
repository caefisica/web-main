<ul>
    <h3>Tags</h3>
    {{ range first 10 .Site.Taxonomies.tags.ByCount }}
        <li>
            <a href="/tags/{{ .Name | urlize }}">{{ .Name }}</a> ({{ .Count }})
        </li>
    {{ end }}
    {{ range (.GetTerms "tags") }}
        <h3>Tag de esta página</h3>
        <li><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></li>
    {{ end }}
</ul>
